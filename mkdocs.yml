site_name: Torch Pharma
site_url: https://torch-pharma.readthedocs.io
theme:
  name: material
  palette:
    primary: indigo
    accent: indigo
  features:
    - navigation.sections
    - navigation.expand
    - content.code.copy
    - search.suggest
    - search.highlight

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - mkdocstrings:
      default_handler: python
      handlers:
        python:
          paths: ["."]
          options:
            show_source: true
            show_root_heading: true
            show_category_heading: true

nav:
  - Home: index.md
  - Installation: installation.md
  - Tutorials:
    - Property Prediction: tutorials/property_prediction.md
    - Molecule Generation: tutorials/molecule_generation.md
    - RL Optimization: tutorials/rl_optimization.md
  - Datasets:
    - QM9: datasets/QM9.md
  - API Reference: api/index.md
