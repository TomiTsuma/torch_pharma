site_name: Torch Pharma
site_url: https://torch-pharma.readthedocs.io
theme:
  name: material
  palette:
    primary: indigo
    accent: indigo
  features:
    - navigation.sections
    - navigation.expand
    - content.code.copy
    - search.suggest
    - search.highlight

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - mkdocstrings:
      default_handler: python
      handlers:
        python:
          setup_commands:
            - import sys
            - from unittest.mock import MagicMock
            - sys.modules["torch"] = MagicMock()
            - sys.modules["torch.nn"] = MagicMock()
            - sys.modules["torch.utils"] = MagicMock()
            - sys.modules["torch_geometric"] = MagicMock()
            - sys.modules["pyg_lib"] = MagicMock()
            - sys.modules["torch_scatter"] = MagicMock()
            - sys.modules["torch_sparse"] = MagicMock()
            - sys.modules["torch_cluster"] = MagicMock()
            - sys.modules["torch_spline_conv"] = MagicMock()
            - sys.modules["rdkit"] = MagicMock()
            - sys.modules["rdkit.Chem"] = MagicMock()
            - sys.path.append(".")

nav:
  - Home: index.md
  - Installation: installation.md
  - Tutorials:
    - Property Prediction: tutorials/property_prediction.md
    - Molecule Generation: tutorials/molecule_generation.md
    - RL Optimization: tutorials/rl_optimization.md
  - Datasets:
    - QM9: datasets/QM9.md
  - API Reference: api/index.md
