site_name: Torch Pharma
site_url: https://torch-pharma.readthedocs.io
description: PyTorch-native framework for drug discovery and molecular deep learning
repo_url: https://github.com/TomiTsuma/torch_pharma
repo_name: TomiTsuma/torch_pharma
copyright: Copyright &copy; 2026 Tomi Tsuma

# PyTorch-inspired theme configuration
theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.expand
    - navigation.indexes
    - navigation.top
    - search.suggest
    - search.highlight
    - content.tabs.link
    - content.code.copy
    - content.code.annotate
  icon:
    repo: fontawesome/brands/github
  font:
    text: Roboto
    code: Roboto Mono

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: python
          class: python
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - tables
  - toc:
      permalink: true

plugins:
  - search
  - mkdocstrings:
      default_handler: python
      handlers:
        python:
          paths: [".."]
          options:
            show_source: true
            show_root_heading: true
            show_root_full_path: false
            show_category_heading: true
            show_if_no_docstring: false
            show_signature_annotations: true
            separate_signature: true
            docstring_style: google
            merge_init_into_class: true
            filters:
              - "!^_"
          inventories:
            - https://docs.python.org/3/objects.inv
            - https://pytorch.org/docs/stable/objects.inv

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/TomiTsuma/torch_pharma
  version:
    provider: mike

# Main navigation structure - PyTorch-style hierarchy
nav:
  - Home: index.md
  - Installation: installation.md
  
  - Getting Started:
    - Quick Start: getting_started/quickstart.md
    - Overview: getting_started/overview.md
    - Concepts: getting_started/concepts.md
  
  - Tutorials:
    - tutorials/index.md
    - Property Prediction: tutorials/property_prediction.md
    - Molecule Generation: tutorials/molecule_generation.md
    - RL Optimization: tutorials/rl_optimization.md
  
  - Datasets:
    - datasets/index.md
  
  - API Reference:
    - api/index.md
    - Molecules: api/molecules/index.md
    - Data: api/data/index.md
    - Models: api/models/index.md
    - Tasks: api/tasks/index.md
    - Training: api/training/index.md
    - Reinforcement Learning: api/rl/index.md
    - Evaluation: api/evaluation/index.md
  
  - Examples:
    - Molecule Generation (GCDM): examples/molecule_generation/index.md

extra_css:
  - stylesheets/extra.css
